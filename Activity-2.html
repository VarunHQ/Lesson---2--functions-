<!DOCTYPE html>
<html lang="en">
<head>
    <title>Parameters and Function Expressions in JavaScript</title>
</head>
<body>
    <script>
        function oddoreven(number) {
            if (number % 2 === 0) {
                document.write(number + " is an even number.");
            } else {
                document.write(number + " is an odd number.");
            }
        }
        let number = prompt("Enter a Number:");
        oddoreven(number);
    </script>
</body>
</html>
