<!DOCTYPE html>
<html lang="en">
<head>
    <title>Multiplication In JavaScript (ACP-1)</title>
</head>
<body>
    <script>
        function multiplication() {
            v = 5;
            s = 10;
            p = 3;
            re = v * s * p;
            return re;
        }
        document.write(multiplication());
    </script>
</body>
</html>
